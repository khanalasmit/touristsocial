<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4b2b" />
      <stop offset="100%" stop-color="#ff416c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Globe Base -->
  <circle cx="50" cy="50" r="45" fill="url(#globeGrad)" />
  
  <!-- Globe Grid Lines (Lat/Long) -->
  <ellipse cx="50" cy="50" rx="20" ry="45" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="45" ry="20" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4"/>
  <line x1="5" y1="50" x2="95" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4"/>

  <!-- Social Map Pin -->
  <path d="M68 25 C58 25 50 33 50 43 C50 56 68 75 68 75 C68 75 86 56 86 43 C86 33 78 25 68 25 Z" 
        fill="url(#pinGrad)" filter="url(#shadow)"/>
        
  <!-- Pin Inner Hole / Dot -->
  <circle cx="68" cy="41" r="6" fill="#ffffff" />
</svg>